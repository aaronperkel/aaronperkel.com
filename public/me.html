<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Aaron Perkel — Contact</title>
    <meta name="theme-color" content="#13222E" />
    <meta name="description" content="Quick contact card for Aaron Perkel." />
    <meta property="og:title" content="Contact Aaron Perkel" />
    <meta property="og:description" content="Tap to call, text, email, or get directions." />
    <meta property="og:image" content="public/img/headshot.webp" />
    <meta property="og:type" content="profile" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/c428e5511d.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #0b0f12;
            --card: #0f141a;
            --muted: #7b8a9a;
            --text: #e6edf3;
            --accent: #0ea5e9;
            --ring: rgba(14, 165, 233, .3);
            --shadow: 0 10px 30px rgba(0, 0, 0, .25);
            --radius: 16px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f7fafc;
                --card: #ffffff;
                --text: #0b1220;
                --muted: #5b6572;
                --shadow: 0 10px 30px rgba(2, 6, 23, .08);
                --ring: rgba(14, 165, 233, .18);
            }
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
            background:
                radial-gradient(1200px 600px at 80% -10%, rgba(14, 165, 233, .18), transparent 60%),
                radial-gradient(1000px 500px at 0% 100%, rgba(59, 130, 246, .15), transparent 60%),
                var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.45;
        }

        .wrap {
            max-width: 720px;
            margin: min(8vh, 80px) auto;
            padding: 24px;
        }

        .card {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, 0)) padding-box,
                linear-gradient(120deg, rgba(14, 165, 233, .5), rgba(99, 102, 241, .5)) border-box;
            border: 1px solid transparent;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: clip;
        }

        .hero {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 28px;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            flex: 0 0 auto;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, .15);
            box-shadow: 0 6px 18px rgba(0, 0, 0, .25);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block
        }

        h1 {
            font-size: clamp(24px, 3.5vw, 34px);
            margin: 0 0 6px 0;
            letter-spacing: .2px
        }

        .tag {
            color: var(--muted);
            font-size: 14px
        }

        .actions {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(4, 1fr);
            padding: 0 28px 20px 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            box-shadow: inset 0 -8px 12px rgba(0, 0, 0, .06);
            transition: transform .12s ease, background .12s ease, border-color .12s ease;
            text-align: center;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-1px);
            border-color: var(--ring);
            background: rgba(255, 255, 255, .08)
        }

        .btn.primary {
            background: linear-gradient(180deg, rgba(14, 165, 233, .9), rgba(14, 165, 233, .75));
            border-color: rgba(14, 165, 233, .9)
        }

        .grid {
            display: grid;
            gap: 8px;
            padding: 0 28px 28px 28px;
            grid-template-columns: 1fr;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .10);
        }

        .muted {
            color: var(--muted)
        }

        .copy {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: transparent;
            color: var(--text);
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .copy:focus-visible,
        .btn:focus-visible {
            outline: 3px solid var(--ring);
            outline-offset: 2px
        }

        .footer {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 16px 10px 6px;
        }

        /* Mobile tweaks: remove backdrop-filter to prevent gradient darkening / banding,
       and apply a subtle, uniform tint so hero matches the rest of the card. */
        @media (max-width:560px) {
            .hero {
                backdrop-filter: none;
            }

            .actions {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        /* Print-friendly */
        @media print {
            body {
                background: #fff
            }

            .card {
                box-shadow: none
            }

            .btn,
            .copy {
                display: none !important
            }

            a {
                border: 0 !important;
                text-decoration: none
            }
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="card" id="card" data-name="Aaron Perkel" data-phone="+1 478-262-8935"
            data-email="me@aaronperkel.com" data-street="81 Buell St Unit 1" data-city="Burlington" data-region="VT"
            data-postal="05401" data-country="USA">
            <div class="hero">
                <div class="avatar">
                    <img src="public/img/headshot.webp" alt="Portrait of Aaron Perkel">
                </div>
                <div>
                    <h1>Aaron Perkel</h1>
                    <div class="tag">If found, please reach out — thank you!</div>
                </div>
            </div>

            <div class="actions">
                <a class="btn primary" id="callBtn"><i class="fa-solid fa-phone"></i> Call</a>
                <a class="btn" id="textBtn"><i class="fa-solid fa-comment-sms"></i> Text</a>
                <a class="btn" id="emailBtn"><i class="fa-solid fa-envelope"></i> Email</a>
                <a class="btn" id="mapBtn" target="_blank" rel="noopener"><i class="fa-solid fa-location-dot"></i>
                    Directions</a>
            </div>

            <div class="grid">
                <div class="row">
                    <i class="fa-solid fa-location-dot"></i>
                    <div class="val">
                        <span class="muted">Address:</span>
                        <span id="addrText"></span>
                    </div>
                    <button class="copy" data-copy=""><i class="fa-solid fa-copy"></i> Copy</button>
                </div>
                <div class="row">
                    <i class="fa-solid fa-phone"></i>
                    <div class="val">
                        <span class="muted">Phone:</span>
                        <a id="phoneLink"></a>
                    </div>
                    <button class="copy" data-copy=""><i class="fa-solid fa-copy"></i> Copy</button>
                </div>
                <div class="row">
                    <i class="fa-solid fa-envelope"></i>
                    <div class="val">
                        <span class="muted">Email:</span>
                        <a id="emailLink"></a>
                    </div>
                    <button class="copy" data-copy=""><i class="fa-solid fa-copy"></i> Copy</button>
                </div>
            </div>

            <div class="actions" style="padding-top:0">
                <button class="btn" id="shareBtn"><i class="fa-solid fa-share-nodes"></i> Share</button>
                <button class="btn" id="vcfBtn"><i class="fa-solid fa-address-card"></i> Add to Contacts</button>
                <button class="btn" id="copyAllBtn"><i class="fa-solid fa-copy"></i> Copy All</button>
                <a class="btn" id="foundBtn"><i class="fa-solid fa-suitcase"></i> Found this?</a>
            </div>

            <div class="footer">© <span id="year"></span> Aaron Perkel</div>
        </section>
    </main>

    <script>
        const card = document.getElementById('card');
        const name = card.dataset.name;
        const phone = card.dataset.phone;
        const email = card.dataset.email;
        const street = card.dataset.street;
        const city = card.dataset.city;
        const region = card.dataset.region;
        const postal = card.dataset.postal;
        const country = card.dataset.country;
        const fullAddr = `${street}, ${city}, ${region} ${postal}, ${country}`.replace(/\s+,/g, ',').trim();

        document.getElementById('year').textContent = new Date().getFullYear();
        document.getElementById('addrText').textContent = fullAddr;
        document.getElementById('phoneLink').textContent = phone;
        document.getElementById('phoneLink').href = `tel:${phone.replace(/[^+\d]/g, '')}`;
        document.getElementById('emailLink').textContent = email;
        document.getElementById('emailLink').href = `mailto:${email}`;
        document.getElementById('callBtn').href = `tel:${phone.replace(/[^+\d]/g, '')}`;
        document.getElementById('textBtn').href = `sms:${phone.replace(/[^+\d]/g, '')}`;
        document.getElementById('emailBtn').href = `mailto:${email}`;
        document.getElementById('mapBtn').href = `https://maps.apple.com/?q=${encodeURIComponent(`${street} ${city} ${region} ${postal}`)}`;
        document.getElementById('foundBtn').href = `mailto:${email}?subject=Found%20your%20bag&body=Hi%20${encodeURIComponent(name)}%2C%20I%20found%20your%20bag.`;

        // Setup copy buttons with FA check flash
        const copyBtns = document.querySelectorAll('.copy');
        const copyVals = [fullAddr, phone, email];
        copyBtns.forEach((btn, idx) => {
            btn.dataset.copy = copyVals[idx];
            btn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(btn.dataset.copy);
                    const oldHTML = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                    setTimeout(() => btn.innerHTML = oldHTML, 1200);
                } catch (e) {
                    alert('Copy failed.');
                }
            });
        });

        document.getElementById('copyAllBtn').addEventListener('click', async () => {
            const blob = [name, phone, email, fullAddr].join('\n');
            try {
                await navigator.clipboard.writeText(blob);
                // match the same visual feedback style
                const btn = document.getElementById('copyAllBtn');
                const oldHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                setTimeout(() => btn.innerHTML = oldHTML, 1200);
            } catch (e) { alert('Copy failed.'); }
        });

        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({ title: `Contact ${name}`, text: `${name} — ${phone}\n${email}\n${fullAddr}`, url: location.href });
                } catch (e) { }
            } else {
                alert('Share not supported on this device.');
            }
        });

        document.getElementById('vcfBtn').addEventListener('click', () => {
            const [fn, ln] = name.split(' ').length > 1 ? [name.split(' ')[0], name.split(' ').slice(1).join(' ')] : [name, ''];
            const vcf = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `N:${ln};${fn};;;`,
                `FN:${name}`,
                `TEL;TYPE=CELL,VOICE:${phone.replace(/\s/g, '')}`,
                `EMAIL;TYPE=INTERNET:${email}`,
                `ADR;TYPE=HOME:;;${street};${city};${region};${postal};${country}`,
                'END:VCARD'
            ].join('\r\n');
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 500);
        });
    </script>

    <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Aaron Perkel",
    "email": "mailto:me@aaronperkel.com",
    "telephone": "+1-478-262-8935",
    "image": "public/img/headshot.webp",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "81 Buell St Unit 1",
      "addressLocality": "Burlington",
      "addressRegion": "VT",
      "postalCode": "05401",
      "addressCountry": "US"
    },
    "url": "https://aaronperkel.com"
  }
  </script>
</body>

</html>
